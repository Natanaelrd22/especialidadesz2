<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Portal Z2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">

</head>
<body class="login-page">

    <div class="login-container">
        <div class="logo-area">
            <img src="Fondo/zona2.png" alt="Logo Z2" onerror="this.src='https://placehold.co/120?text=Z2+Logo'">
        </div>

        <!-- Formulario de Inicio de Sesión -->
        <div id="login-section">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn--primary" style="width: 100%; justify-content: center;">Iniciar Sesión</button>
            </form>
            <div class="switch-form">
                ¿No tienes cuenta? <a href="javascript:void(0)" onclick="toggleForm()">Regístrate aquí</a>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div id="register-section" class="hidden">
            <h2>Crear Cuenta</h2>
            <p>Completa tus datos para registrarte</p>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="reg-email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass" required placeholder="Crea una contraseña">
                </div>
                <button type="submit" class="btn btn--primary" style="width: 100%; justify-content: center;">Registrarse</button>
            </form>
            <div class="switch-form">
                ¿Ya tienes cuenta? <a href="javascript:void(0)" onclick="toggleForm()">Inicia sesión</a>
            </div>
        </div>
    </div>

<script>
        // Configuración de Supabase
        const supabaseUrl = 'https://snznujqmoimycrfdtqgi.supabase.co';
        const supabaseKey = 'sb_publishable_sBsXMDH8sD4eC8PANPyaYw_3mNggHi0';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Sanitización básica de inputs
        function sanitizeInput(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Hash de contraseña con PBKDF2 (cliente-side)
        async function hashPassword(password) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey(
                'raw',
                enc.encode(password),
                { name: 'PBKDF2' },
                false,
                ['deriveBits']
            );
            const hashBuffer = await crypto.subtle.deriveBits(
                {
                    name: 'PBKDF2',
                    salt: enc.encode('z2-portal-salt'),
                    iterations: 100000,
                    hash: 'SHA-256'
                },
                keyMaterial,
                256
            );
            return btoa(String.fromCharCode(...new Uint8Array(hashBuffer)));
        }

        function toggleLoading(btn, show) {
            btn.disabled = show;
            btn.innerHTML = show ? '<span class="loading"></span> Cargando...' : btn.dataset.originalText || btn.innerText;
        }

        function toggleForm() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('register-section').classList.toggle('hidden');
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.dataset.originalText = btn.innerText;
            toggleLoading(btn, true);

            try {
                const name = sanitizeInput(document.getElementById('reg-name').value.trim());
                const email = sanitizeInput(document.getElementById('reg-email').value.trim().toLowerCase());
                const pass = document.getElementById('reg-pass').value;

                if (!name || !email || !pass) {
                    throw new Error('Por favor completa todos los campos.');
                }
                if (pass.length < 6) {
                    throw new Error('La contraseña debe tener al menos 6 caracteres.');
                }
                if (!/^[\w-\.]+@([\w-]+\.)+[\w-]{2,4}$/.test(email)) {
                    throw new Error('Formato de correo inválido.');
                }

                const hashedPass = await hashPassword(pass);

                const { data, error } = await _supabase
                    .from('users')
                    .insert([{ name, email, password: hashedPass, role: 'user', blocked: false }]);

                if (error) {
                    throw new Error(error.code === '42501' ? 'Error de permisos (RLS) en la base de datos.' : error.message);
                }
                
                alert('¡Registro exitoso! Ahora puedes iniciar sesión.');
                toggleForm();
                e.target.reset();
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                toggleLoading(btn, false);
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.dataset.originalText = btn.innerText;
            toggleLoading(btn, true);

            try {
                const email = sanitizeInput(document.getElementById('login-email').value.trim().toLowerCase());
                const pass = document.getElementById('login-pass').value;

                if (!email || !pass) {
                    throw new Error('Ingresa correo y contraseña.');
                }

                const hashedPass = await hashPassword(pass);
                console.log("Hash generado para login:", hashedPass); // Ayuda para depurar

                const { data: user, error } = await _supabase
                    .from('users')
                    .select('*')
                    .ilike('email', email) // ilike no distingue entre mayúsculas y minúsculas
                    .eq('password', hashedPass)
                    .maybeSingle(); // Cambiado para evitar error 406 si no hay resultados

                if (error) throw new Error('Error de conexión: ' + error.message);
                
                if (user) {
                    if (user.blocked) {
                        throw new Error('Tu cuenta está bloqueada. Contacta al administrador.');
                    }
                    
                    // Seguridad: Eliminar la contraseña del objeto antes de guardar en localStorage
                    const { password, ...userSession } = user;
                    localStorage.setItem('z2_current_user', JSON.stringify(userSession));
                    window.location.href = 'panel_principal.html';
                } else {
                    throw new Error('Correo o contraseña incorrectos.');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                toggleLoading(btn, false);
            }
        }
    </script>
</body>
</html>
