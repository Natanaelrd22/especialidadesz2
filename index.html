<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Portal Z2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e293b;
            --bg-light: #f1f5f9;
            --white: #ffffff;
            --text-main: #334155;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .login-container {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .logo-area img {
            width: 120px;
            height: auto;
            margin-bottom: 1.5rem;
        }

        h2 {
            margin-bottom: 0.5rem;
            color: var(--secondary-color);
        }

        p {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .switch-form {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .switch-form a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <img src="fondo/zona2.png" alt="Logo Z2" onerror="this.src='https://via.placeholder.com/120?text=Z2+Logo'">
        </div>

        <!-- Formulario de Inicio de Sesión -->
        <div id="login-section">
            <h2>Bienvenido</h2>
            <p>Ingresa tus credenciales para continuar</p>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Iniciar Sesión</button>
            </form>
            <div class="switch-form">
                ¿No tienes cuenta? <a href="#" onclick="toggleForm()">Regístrate aquí</a>
            </div>
        </div>

        <!-- Formulario de Registro -->
        <div id="register-section" class="hidden">
            <h2>Crear Cuenta</h2>
            <p>Completa tus datos para registrarte</p>
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="reg-name" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="reg-email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass" required placeholder="Crea una contraseña">
                </div>
                <button type="submit" class="btn-submit">Registrarse</button>
            </form>
            <div class="switch-form">
                ¿Ya tienes cuenta? <a href="#" onclick="toggleForm()">Inicia sesión</a>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const supabaseUrl = 'https://snznujqmoimycrfdtqgi.supabase.co';
        const supabaseKey = 'sb_publishable_sBsXMDH8sD4eC8PANPyaYw_3mNggHi0';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function toggleForm() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('register-section').classList.toggle('hidden');
        }

        async function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            const { data, error } = await _supabase
                .from('users')
                .insert([{ name, email, password: pass, role: 'user' }]);

            if (error) alert('Error: ' + error.message);
            else {
                alert('Registro exitoso.');
                toggleForm();
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            const { data: user, error } = await _supabase
                .from('users')
                .select('*')
                .eq('email', email)
                .eq('password', pass)
                .single();

            if (user) {
                if (user.blocked) {
                    alert('Tu cuenta ha sido bloqueada. Por favor, contacta al administrador.');
                    return;
                }
                localStorage.setItem('z2_current_user', JSON.stringify(user));
                window.location.href = 'panel_principal.html';
            } else {
                alert('Correo o contraseña incorrectos.');
            }
        }
    </script>
</body>
</html>
